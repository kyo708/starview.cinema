spring.application.name=cinemabooking

# Import the secret file. 'optional:' means the app won't crash if the file is missing 
# (which is perfect for when you deploy to the cloud and use real environment variables instead).
spring.config.import=optional:classpath:application-secret.yml

# ==========================================
# 1. SERVER CONFIGURATION
# ==========================================
server.port=8080
# Optional: Set a global API prefix so your endpoints look like /api/v1/movies
server.servlet.context-path=/api/v1

# ==========================================
# 2. DATABASE CONFIGURATION (MySQL)
# ==========================================
# Replace 'starview_db' with your actual database name. 
# The ?useSSL=false&serverTimezone=UTC helps prevent common timezone connection errors.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/starview_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 3. JPA & HIBERNATE SETTINGS
# ==========================================
# 'update' automatically creates/updates your tables based on your Java Entities (like GheSuatChieu).
# Change this to 'validate' or 'none' when moving to production.
spring.jpa.hibernate.ddl-auto=create

# Crucial for debugging your Optimistic Locking concurrency feature. 
# This prints the exact SQL statements to your terminal so you can verify the 'lock' version check.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

# Open-in-view is generally discouraged in REST APIs as it ties database connections to the web layer.
spring.jpa.open-in-view=false

# ==========================================
# 4. JWT (JSON WEB TOKEN) CONFIGURATION
# ==========================================
# We define custom properties here that you will inject into your Java code using @Value.
# The secret MUST be a long, secure Base64 string in production.
app.jwt.secret=${JWT_SECRET:MySuperSecretDevelopmentKeyThatIsAtLeast32BytesLong!}

# Expiration time for the token in milliseconds. 
# 86400000 ms = 24 hours.
app.jwt.expiration-ms=86400000